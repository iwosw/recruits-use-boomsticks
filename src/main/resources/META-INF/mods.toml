modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
displayTest = "MATCH_VERSION"
issueTrackerURL = "https://github.com/iwosw/recruits-use-boomsticks/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
displayURL = "https://github.com/iwosw/recruits-use-boomsticks"
logoFile = "icon.png"
description = '''${mod_description}'''

[[dependencies."${mod_id}"]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "recruits"
mandatory = true
versionRange = "[1.15.2,1.16)"
ordering = "AFTER"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "medieval_boomsticks"
mandatory = true
versionRange = "[1.01,1.02)"
ordering = "AFTER"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "geckolib"
mandatory = true
versionRange = "[4.8.3,4.9)"
ordering = "AFTER"
side = "BOTH"
