name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and run unit tests
        run: ./gradlew test build --no-daemon --stacktrace

      - name: Run dedicated-server GameTests
        run: ./gradlew runGameTestServer --no-daemon --stacktrace

      - name: Upload release JAR
        uses: actions/upload-artifact@v4
        with:
          name: recruits-use-boomsticks
          path: build/libs/*.jar
          if-no-files-found: error
